<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>MetaCubeXD</title>
    <script>
      // Deploy-time backend URL override; an empty secret keeps the user able
      // to switch backends via the connect form without reloading.
      window.__METACUBEXD_CONFIG__ = window.__METACUBEXD_CONFIG__ || { defaultBackendURL: "" };
    </script>
    <script
      src="config.js"
      onerror="window.__METACUBEXD_CONFIG__ = { defaultBackendURL: '' }"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
